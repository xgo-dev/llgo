name: Metadata Benchmark

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  bench:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        scale: [Small, Medium, Large, XL]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Run ${{ matrix.scale }} benchmark
        run: |
          go test -bench="/${{ matrix.scale }}$" -benchmem -benchtime=1s ./internal/metadata/ \
            | tee bench-${{ matrix.scale }}.txt
      - name: Upload ${{ matrix.scale }} results
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.scale }}
          path: bench-${{ matrix.scale }}.txt

  report:
    needs: bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Output benchmark comparison
        run: |
          echo '##  Benchmark Results: V1 (LLPS uvarint) vs V2 (LLP2 fixed-width)'
          echo ''
          for scale in Small Medium Large XL; do
            echo "### ${scale} (200 / 1k / 5k / 20k symbols)"
            echo '```'
            cat bench-${scale}/bench-${scale}.txt
            echo '```'
            echo ''
          done
          echo '---'
          echo '**V2 decode advantage:** section directory + GroupView index avoids per-entry map allocation. O(1~80) allocs vs O(n~30916).'
